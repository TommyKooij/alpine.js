<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Ninja Signup Form</title>
    <link
      rel="stylesheet"
      href="styles.css"
    />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="index.js"></script>
  </head>
  <body>
    <form
      x-data="signupForm"
      @submit.prevent="onSubmitForm"
    >
      <h1>Ninja Signup Form</h1>

      <!-- username -->
      <div class="form-field">
        <p
          class="hint"
          x-bind:class="{'warning': username.length > 10}"
        >
          <span x-text="15 - username.length"></span> characters remaining
        </p>
        <label>
          <span></span>Username:
          <input
            type="text"
            maxlength="15"
            x-model="username"
          />
        </label>

        <template x-if="errors.username">
          <p class="error" x-text="errors.username"></p>
        </template>

        <div x-text="username"></div>
      </div>

      <!-- password -->
      <div class="form-field password">
        <label>
          <span>Password:</span>
          <input
            x-bind:type="showPass ? 'text' : 'password'"
            x-model="password"
          />
        </label>
        <button
          type="button"
          @click="showPass = !showPass"
        >
          <span x-text="showPass ? 'Hide' : 'Show'"></span>
        </button>

        <template x-if="errors.password">
          <p class="error" x-text="errors.password"></p>
        </template>

        <div x-text="password"></div>
      </div>

      <!-- confirm password -->
      <div class="form-field">
        <label>
          <span>Confirm Password:</span>
          <input
            type="password"
            x-model="passwordConfirm"
          />
        </label>

        <template x-if="errors.passwordConfirm">
          <p class="error" x-text="errors.passwordConfirm"></p>
        </template>

        <div x-text="passwordConfirm"></div>
      </div>

      <!-- belt color -->
      <div class="form-field">
        <label
          >Belt Color:
          <select x-model="belt">
            <option value="">Select a belt</option>

            <template x-for="(choice, index) in beltChoices" :key="choice">
              <option :value="choice" x-text="choice"></option>
            </template>

          </select>
        </label>

        <template x-if="errors.belt">
          <p class="error" x-text="errors.belt"></p>
        </template>

        <div x-text="belt"></div>
      </div>

      <!-- short bio -->
      <div class="form-field">
        <p
          class="hint"
          x-bind:class="{'warning': bio.length > 90}"
        >
          <span x-text="100 - bio.length"></span> characters remaining
        </p>
        <label>
          <span>Short Bio:</span>
          <textarea
            maxlength="100"
            x-model="bio"
          ></textarea>
        </label>

        <template x-if="errors.bio">
          <p class="error" x-text="errors.bio"></p>
        </template>

        <div x-text="bio"></div>
      </div>

      <!-- newsletter signup -->
      <div class="form-field newsletter">
        <label>
          <input
            type="checkbox"
            x-model="newsletter"
          />
          <span>Sign up for the newsletter</span>
        </label>
        <div x-text="newsletter"></div>
      </div>

      <!-- submit button -->
      <button type="submit">Submit</button>

      <div class="overlay" x-show="success" x-cloak x-transition.opacity.duration.500ms>
        <div class="modal" x-show="success" x-transition:enter-start="off-screen" x-transition:enter-end="on-screen">
          <h2>Thank You!</h2>
          <button type="button" @click="success = false">Close</button>
        </div>
      </div>
    </form>
  </body>
</html>
